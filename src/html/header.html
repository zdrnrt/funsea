<header class="header">
  <div class="header__top">
    <div class="header__top-content container">
      <a href="/" class="header__logo">
        <img class="header-logo__pic" src="/src/assets/images/header/logo.svg" alt="">
      </a>
      <div class="header__links header-links">
        <a href="#" class="header-links__link">FAQ</a>
        <a href="#" class="header-links__link">Блог</a>
      </div>
      <div class="header__search">
        <form action="#" class="header-search js-header-search">
          <img src="/src/assets/images/icons/search.svg" alt="" class="header-search__icon">
          <input class="header-search__input" type="text" name="search" placeholder="Поиск">
        </form>
      </div>
      <div class="header__position">
        <a href="#" class="header-position">
          <img src="/src/assets/images/icons/marker.svg" alt="" class="header-position__icon">
          <span class="header-position__name">Туапсе</span>
        </a>
      </div>
      <div class="header__user">
        <button class="header-user js-modal-trigger" data-target-modal="auth-user">
          <span class="header-user__login">Войти</span>
          <img src="/src/assets/images/icons/user.svg" alt="#" class="header-user__icon">
        </button>
      </div>
      <button class="header__mobile-menu header-mobile-menu js-header-menu-open">
        <img class="header-mobile-menu__icon header-mobile-menu__icon--open"
          src="/src/assets/images/icons/toggle-mobile.svg" alt="">
        <img class="header-mobile-menu__icon header-mobile-menu__icon--close" src="/src/assets/images/icons/close.svg"
          alt="">

      </button>
    </div>
  </div>
  <div class="header__bottom">
    <div class="container header__bottom-content">
      <a href="#" class="header__catalog header-catalog">
        <svg class="header-catalog__icon" viewBox="0 0 20 11" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="19.3452" height="1.5062" />
          <rect y="9.0376" width="19.3452" height="1.5062" />
        </svg>
        Каталог
      </a>
      <nav class="header__nav header-nav">
        <ul class="header-nav__list">
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Джиппинг</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Морские прогулки</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Квадро-туры</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Активный отдых</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Для детей</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Дайвинг</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Для больших групп</a>
          </li>
          <li class="header-nav__item">
            <a href="#" class="header-nav__link">Индивидуальные</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
  <div class="header-menu js-header-menu">
    <nav class="header-menu__nav menu-nav">
      <ul class="menu-nav__list">
        <li class="menu-nav__item">
          <a href="#" class="menu-nav__link">
            Каталог развлечений</a>
        </li>
        <li class="menu-nav__item">
          <a href="#" class="menu-nav__link">Блог</a>
        </li>
        <li class="menu-nav__item">
          <a href="#" class="menu-nav__link">О нас</a>
        </li>
        <li class="menu-nav__item">
          <a href="#" class="menu-nav__link">Частые вопросы</a>
        </li>
      </ul>
    </nav>
    <div class="header-menu__signin menu-signin">
      <div class="menu-signin__text">Войдете, чтобы использовать все возможности</div>
      <button class="menu-signin__btn js-modal-trigger js-header-menu-close" data-target-modal="auth-user">Вход в кабинет</button>
    </div>
    <div class="header-menu__social menu-social">
        <div class="menu-social__text">Мы в социальных сетях</div>
        <div class="menu-social__list">
          <a href="#" class="menu-social__link"><img src="/src/assets/images/footer/tg.svg" alt=""></a>
          <a href="#" class="menu-social__link"><img src="/src/assets/images/footer/dzen.svg" alt=""></a>
          <a href="#" class="menu-social__link"><img src="/src/assets/images/footer/vk.svg" alt=""></a>
        </div>
      </div>
  </div>
</header>
